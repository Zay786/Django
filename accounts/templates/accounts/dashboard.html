<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        /* Top Navbar */
        .navbar {
            background: #0F2448;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            margin: 0;
            font-size: 20px;
        }

        .logout-btn {
            background: #ff4d4d;
            border: none;
            padding: 8px 15px;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .logout-btn:hover {
            background: #cc0000;
        }

        /* Main content */
        .container {
            padding: 40px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            max-width: 500px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-top: 0;
            color: #0F2448;
        }

        .info {
            margin: 10px 0;
            font-size: 16px;
        }

        .label {
            font-weight: bold;
            color: #333;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <h2>My Dashboard</h2>

    <form method="POST" action="{% url 'logout' %}">
        {% csrf_token %}
        <button class="logout-btn" type="submit">Logout</button>
    </form>
</div>

<!-- Content -->
<div class="container">
    <div class="card">
        <h3>Welcome, {{ user.first_name }} 👋</h3>

        <p class="info"><span class="label">Username:</span> {{ user.username }}</p>
        <p class="info"><span class="label">Email:</span> {{ user.email }}</p>
    </div>
</div>

</body>
</html>
